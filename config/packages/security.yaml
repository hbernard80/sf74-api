security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_AUTHOR: ROLE_USER
        ROLE_ADMIN: [ROLE_AUTHOR, ROLE_USER]

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            http_basic: ~
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                # route de redirection après connexion
                default_target_path: app_main
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_main
            remember_me:
                    secret: '%kernel.secret%'
                    lifetime: 604800 # 1 semaine en secondes
                    # always_remember_me: true # pour toujours activer sans case à cocher
            # Compte actif ?
            user_checker: App\Security\UserChecker

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        #
        # API publique
        #

        # Swagger / API docs
        - { path: ^/api/v1/?$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/docs.jsonld, roles: PUBLIC_ACCESS }

        # Lecture publique de l'API
        - { path: ^/api/v1/posts(?:/|$), roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/v1/categories(?:/|$), roles: PUBLIC_ACCESS, methods: [GET] }

        #
        # API authentifiée
        #

        # Création/modification/suppression d'articles
        - { path: ^/api/v1/posts, roles: ROLE_AUTHOR, methods: [POST, PATCH, PUT, DELETE] }

        # Gestion catégories API
        - { path: ^/api/v1/categories, roles: ROLE_ADMIN, methods: [POST, PATCH, PUT, DELETE] }

        # Gestion utilisateurs API
        - { path: ^/api/v1/users(?:/|$), roles: ROLE_ADMIN }

        # Toute autre route API est privée par défaut
        - { path: ^/api, roles: ROLE_ADMIN }

        #
        # Back-office
        #

        # Administration globale
        - { path: ^/admin, roles: ROLE_ADMIN }

        # Lecture publique des contenus web
        - { path: ^/post(?:/\d+)?$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/category(?:/\d+)?$, roles: PUBLIC_ACCESS, methods: [GET] }

        # Écriture des articles web
        - { path: ^/post/new$, roles: ROLE_AUTHOR }
        - { path: ^/post/\d+/edit$, roles: ROLE_AUTHOR }
        - { path: ^/post/\d+$, roles: ROLE_AUTHOR, methods: [POST] }

        # Administration des catégories web
        - { path: ^/category/new$, roles: ROLE_ADMIN }
        - { path: ^/category/\d+/edit$, roles: ROLE_ADMIN }
        - { path: ^/category/\d+$, roles: ROLE_ADMIN, methods: [POST] }

        #
        # Profil utilisateur
        #
        - { path: ^/user/profile$, roles: ROLE_USER }

        #
        # Login / logout
        #
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
